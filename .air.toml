root = "."
testdata_dir = "testdata"
tmp_dir = "server/out/dev"
env_files = [".env"]

[build]
args_bin = []
pre_cmd = ["mkdir -p server/out/dev"]
entrypoint = "./server/out/dev/server_dev"
cmd = "cd server && go build -o ./out/dev/server_dev ./cmd/api"
delay = 1000

# Includes
include_ext = ["go", "mod"]
include_dir = ["server"]

# Excludes
exclude_pattern = ["_test.go"]
exclude_dir = ["*"]
exclude_regex = ["_test\\.go"]
exclude_unchanged = false

follow_symlink = true
keep_on_interrupt = false
log = "build-errors.log"
poll = false
poll_interval = 0
rerun = false
rerun_delay = 500
send_interrupt = true
kill_delay = 500
stop_on_error = true


[color]
# Customize each part's color. If no color found, use the raw app log.
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[log]
main_n_chars = 10
time = false

[misc]
clean_on_exit = false

[screen]
clear_on_rebuild = true
keep_scroll = true
